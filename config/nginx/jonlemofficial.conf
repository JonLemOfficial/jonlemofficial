# Upstream configuration for the Next.js application
# It can point to a localhost port (e.g. systemd/pm2 setup) or a docker container.
upstream nextjs_app {
    # If running with Systemd or PM2 directly on the host:
    server 127.0.0.1:3000;
    
    # If using Docker Compose (uncomment this and comment the above):
    # server web:3000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name jonlemofficial.com www.jonlemofficial.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jonlemofficial.com www.jonlemofficial.com;

    # SSL configuration (Replace with your actual Let's Encrypt / Certbot cert paths)
    ssl_certificate /etc/letsencrypt/live/jonlemofficial.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jonlemofficial.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers for best practices
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    
    # Gzip compression for faster loading
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # 1. Handle Next.js static assets routing
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Aggressive cache control for Next.js build assets
        expires 365d;
        access_log off;
    }

    # 2. Handle Public folder routing (e.g., /assets/, favicon.ico, images)
    location /assets/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # Cache control for public assets
        expires 30d;
        access_log off;
    }

    # 3. Main application proxy routing for all other requests
    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Proxy headers to pass real client info to Next.js
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
